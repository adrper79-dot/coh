name: Voice Lint

on:
  pull_request:
    branches:
      - main

jobs:
  voice-lint:
    name: Scan user-facing copy for blocked terms
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run voice-lint
        run: node scripts/voice-lint.mjs
