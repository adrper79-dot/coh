name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm install

      - name: Deploy backend to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: '.'

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm install

      - name: Build frontend
        working-directory: ./web
        env:
          VITE_API_URL: https://cypher-of-healing-api.workers.dev/api
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
        run: npm run build

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name coh
          workingDirectory: './web'

      - name: Deployment notification
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Backend: https://cypher-of-healing-api.workers.dev"
          echo "Frontend: https://coh.pages.dev"

      - name: Deployment failure notification
        if: failure()
        run: echo "❌ Deployment failed. Check the logs above."
